<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PITLANE — Cek Harga Mobil Lelang</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c10;
  --surface: #0f1419;
  --surface2: #161d26;
  --surface3: #1d2733;
  --border: #252f3d;
  --accent: #00d4ff;
  --accent2: #ff6b35;
  --accent3: #00ff9d;
  --warn: #ffd166;
  --text: #e8edf2;
  --text-mid: #8a9bb0;
  --text-dim: #465870;
  --radius: 10px;
  --font-display: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* BG GRID */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* HEADER */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(8,12,16,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 1.5rem;
  letter-spacing: 0.08em;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-mark {
  width: 30px;
  height: 30px;
  background: var(--accent);
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--bg);
  font-size: 13px;
}

.logo-text { color: var(--text); }
.logo-text span { color: var(--accent); }

.badge {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  padding: 4px 10px;
  border-radius: 3px;
  border: 1px solid;
  letter-spacing: 0.05em;
}

.badge-ai {
  color: var(--accent3);
  border-color: rgba(0,255,157,0.3);
  background: rgba(0,255,157,0.06);
}

/* MAIN */
main {
  flex: 1;
  position: relative;
  z-index: 1;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* SEARCH CARD */
.search-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  position: relative;
  overflow: hidden;
}

.search-card::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 150px; height: 150px;
  background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
  pointer-events: none;
}

.search-label {
  font-family: var(--font-display);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.search-label::before {
  content: '';
  width: 16px;
  height: 2px;
  background: var(--accent);
}

.input-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}

.input-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.input-group label {
  font-size: 0.72rem;
  color: var(--text-dim);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.input-group input, .input-group select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.88rem;
  padding: 9px 11px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}

.input-group input:focus, .input-group select:focus {
  border-color: var(--accent);
}

.input-group select option { background: var(--surface2); }

.input-full { grid-column: 1 / -1; }

.search-btn {
  width: 100%;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 6px;
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
  margin-top: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.search-btn:hover { background: #00b8d9; transform: translateY(-1px); }
.search-btn:disabled {
  background: var(--surface3);
  color: var(--text-dim);
  cursor: not-allowed;
  transform: none;
}

/* LOADING */
.loading-state {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 18px;
  display: none;
}

.loading-state.active { display: block; }

.loading-title {
  font-family: var(--font-display);
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 16px;
}

.loading-steps {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.step {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.83rem;
  color: var(--text-dim);
  transition: color 0.3s;
}

.step.active { color: var(--text); }
.step.done { color: var(--accent3); }

.step-icon {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
  transition: all 0.3s;
}

.step.active .step-icon {
  border-color: var(--accent);
  background: rgba(0,212,255,0.1);
  animation: spin-glow 1s linear infinite;
}

.step.done .step-icon {
  background: rgba(0,255,157,0.1);
  border-color: var(--accent3);
}

@keyframes spin-glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0,212,255,0.4); }
  50% { box-shadow: 0 0 8px 2px rgba(0,212,255,0.2); }
}

/* RESULT */
.result-area {
  display: none;
  flex-direction: column;
  gap: 14px;
  animation: fadeUp 0.4s ease;
}

.result-area.active { display: flex; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* UNIT HEADER */
.unit-header {
  background: linear-gradient(135deg, #0f1e2e 0%, #0f1419 100%);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius: var(--radius);
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}

.unit-header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0;
  width: 100%; height: 2px;
  background: linear-gradient(90deg, var(--accent), transparent);
}

.unit-name {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: 0.02em;
  line-height: 1.1;
  margin-bottom: 4px;
}

.unit-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.meta-tag {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  padding: 3px 8px;
  border-radius: 3px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-mid);
}

/* PRICE SUMMARY */
.price-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.price-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  position: relative;
  overflow: hidden;
}

.price-card.highlight {
  border-color: rgba(255,107,53,0.4);
  background: linear-gradient(135deg, #1a0f0a 0%, #0f1419 100%);
}

.price-card.highlight::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 2px;
  background: var(--accent2);
}

.price-card-label {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
}

.price-card-value {
  font-family: var(--font-display);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
}

.price-card.highlight .price-card-value { color: var(--accent2); }

.price-card-sub {
  font-size: 0.72rem;
  color: var(--text-dim);
  margin-top: 3px;
}

/* BID METER */
.bid-meter-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.section-title {
  font-family: var(--font-display);
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.section-title::before {
  content: '';
  width: 12px;
  height: 2px;
  background: var(--accent);
}

.bid-tiers {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.bid-tier {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.tier-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.tier-dot.green { background: var(--accent3); }
.tier-dot.yellow { background: var(--warn); }
.tier-dot.red { background: #ff4757; }

.tier-info { flex: 1; }

.tier-label {
  font-size: 0.78rem;
  color: var(--text-mid);
  margin-bottom: 2px;
}

.tier-price {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
}

.tier-badge {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 2px 7px;
  border-radius: 3px;
}

.tier-badge.green { background: rgba(0,255,157,0.1); color: var(--accent3); border: 1px solid rgba(0,255,157,0.2); }
.tier-badge.yellow { background: rgba(255,209,102,0.1); color: var(--warn); border: 1px solid rgba(255,209,102,0.2); }
.tier-badge.red { background: rgba(255,71,87,0.1); color: #ff4757; border: 1px solid rgba(255,71,87,0.2); }

/* MARKETPLACE TABLE */
.market-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.market-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.market-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  gap: 10px;
}

.market-name {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-mid);
  width: 80px;
  flex-shrink: 0;
}

.market-range {
  flex: 1;
  font-size: 0.8rem;
  color: var(--text);
}

.market-avg {
  font-family: var(--font-display);
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--accent);
  text-align: right;
  white-space: nowrap;
}

.market-count {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  color: var(--text-dim);
  text-align: right;
}

/* ANALYSIS */
.analysis-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.analysis-text {
  font-size: 0.85rem;
  line-height: 1.7;
  color: var(--text-mid);
}

.analysis-text strong { color: var(--accent2); }
.analysis-text .highlight-green { color: var(--accent3); font-weight: 600; }
.analysis-text .highlight-blue { color: var(--accent); font-weight: 600; }

/* SOURCE ROW */
.source-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.source-chip {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  padding: 3px 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text-dim);
}

/* ERROR */
.error-card {
  background: rgba(255,71,87,0.06);
  border: 1px solid rgba(255,71,87,0.2);
  border-radius: var(--radius);
  padding: 16px;
  color: #ff6b7a;
  font-size: 0.85rem;
  display: none;
}

.error-card.active { display: block; }

/* FOOTER */
footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  text-align: center;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--text-dim);
  position: relative;
  z-index: 1;
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">⬡</div>
    <div class="logo-text">PIT<span>LANE</span></div>
  </div>
  <div class="badge badge-ai">AI · HARGA LELANG</div>
</header>

<main>
  <!-- SEARCH -->
  <div class="search-card">
    <div class="search-label">Cek Harga Unit</div>
    <div class="input-grid">
      <div class="input-group">
        <label>Merek</label>
        <input type="text" id="merek" placeholder="Toyota, Honda..." />
      </div>
      <div class="input-group">
        <label>Model</label>
        <input type="text" id="model" placeholder="Avanza, Brio..." />
      </div>
      <div class="input-group">
        <label>Tahun</label>
        <input type="number" id="tahun" placeholder="2020" min="2000" max="2025" />
      </div>
      <div class="input-group">
        <label>Tipe / Varian</label>
        <input type="text" id="varian" placeholder="G, E, RS, 1.5..." />
      </div>
      <div class="input-group input-full">
        <label>Kondisi Unit (untuk estimasi bid)</label>
        <select id="kondisi">
          <option value="bagus">Sangat Bagus — minor / siap jual</option>
          <option value="normal" selected>Normal — perlu touch up ringan</option>
          <option value="sedang">Sedang — perlu perbaikan medium</option>
          <option value="rusak">Butuh Perbaikan Besar</option>
        </select>
      </div>
    </div>
    <button class="search-btn" id="searchBtn" onclick="doSearch()">
      <span>⬡</span> ANALISA HARGA
    </button>
  </div>

  <!-- LOADING -->
  <div class="loading-state" id="loadingState">
    <div class="loading-title">▶ Menganalisa unit...</div>
    <div class="loading-steps">
      <div class="step" id="step1">
        <div class="step-icon">1</div>
        <span>Mencari data listing OLX & Mobil123</span>
      </div>
      <div class="step" id="step2">
        <div class="step-icon">2</div>
        <span>Menganalisa harga pasar & tren</span>
      </div>
      <div class="step" id="step3">
        <div class="step-icon">3</div>
        <span>Menghitung rekomendasi harga bid lelang</span>
      </div>
      <div class="step" id="step4">
        <div class="step-icon">4</div>
        <span>Menyusun laporan & analisis</span>
      </div>
    </div>
  </div>

  <!-- ERROR -->
  <div class="error-card" id="errorCard"></div>

  <!-- RESULT -->
  <div class="result-area" id="resultArea"></div>
</main>

<footer>PITLANE v1.0 · AI-powered · Data dari marketplace publik Indonesia</footer>

<script>
let currentSearch = {};

function setStep(n, status) {
  for (let i = 1; i <= 4; i++) {
    const el = document.getElementById(`step${i}`);
    el.className = 'step';
    el.querySelector('.step-icon').textContent = i;
    if (i < n) { el.classList.add('done'); el.querySelector('.step-icon').textContent = '✓'; }
    else if (i === n) el.classList.add('active');
  }
}

async function doSearch() {
  const merek = document.getElementById('merek').value.trim();
  const model = document.getElementById('model').value.trim();
  const tahun = document.getElementById('tahun').value.trim();
  const varian = document.getElementById('varian').value.trim();
  const kondisi = document.getElementById('kondisi').value;

  if (!merek || !model || !tahun) {
    alert('Isi Merek, Model, dan Tahun dulu ya!');
    return;
  }

  currentSearch = { merek, model, tahun, varian, kondisi };

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  document.getElementById('loadingState').classList.add('active');
  document.getElementById('resultArea').classList.remove('active');
  document.getElementById('resultArea').innerHTML = '';
  document.getElementById('errorCard').classList.remove('active');

  // Simulate step progress
  setStep(1, 'active');
  await delay(1200);
  setStep(2, 'active');
  await delay(1000);
  setStep(3, 'active');

  try {
    const result = await callAI(merek, model, tahun, varian, kondisi);
    setStep(4, 'active');
    await delay(600);
    setStep(5);
    document.getElementById('loadingState').classList.remove('active');
    renderResult(result, merek, model, tahun, varian);
  } catch(e) {
    document.getElementById('loadingState').classList.remove('active');
    const err = document.getElementById('errorCard');
    err.textContent = 'Gagal menganalisa. Coba lagi atau periksa koneksi internet.';
    err.classList.add('active');
  }

  btn.disabled = false;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function callAI(merek, model, tahun, varian, kondisi) {
  const kondisiMap = {
    bagus: 'sangat bagus / minor, siap jual langsung',
    normal: 'normal, perlu touch up ringan (poles, cuci, minor dent)',
    sedang: 'sedang, perlu perbaikan medium (cat sebagian, servis ringan)',
    rusak: 'butuh perbaikan besar (mesin/transmisi/body major)'
  };

  const prompt = `Kamu adalah analis harga mobil bekas Indonesia profesional dengan akses data pasar terkini.

Tugas: Analisa harga pasar untuk unit berikut dan berikan rekomendasi harga bid lelang.

Unit: ${merek} ${model} ${varian ? varian + ' ' : ''}${tahun}
Kondisi unit: ${kondisiMap[kondisi]}

Berikan analisis dalam format JSON STRICT berikut (HANYA JSON, tidak ada teks lain):

{
  "unit_name": "nama lengkap unit",
  "tahun": ${tahun},
  "ringkasan_pasar": "2-3 kalimat tentang kondisi pasar unit ini di Indonesia saat ini",
  "harga_retail_rata": 000000000,
  "harga_retail_min": 000000000,
  "harga_retail_max": 000000000,
  "marketplace": [
    {
      "nama": "OLX",
      "harga_min": 000000000,
      "harga_max": 000000000,
      "harga_rata": 000000000,
      "jumlah_listing": "estimasi"
    },
    {
      "nama": "Mobil123",
      "harga_min": 000000000,
      "harga_max": 000000000,
      "harga_rata": 000000000,
      "jumlah_listing": "estimasi"
    },
    {
      "nama": "Carro",
      "harga_min": 000000000,
      "harga_max": 000000000,
      "harga_rata": 000000000,
      "jumlah_listing": "estimasi"
    },
    {
      "nama": "Garasi.id",
      "harga_min": 000000000,
      "harga_max": 000000000,
      "harga_rata": 000000000,
      "jumlah_listing": "estimasi"
    }
  ],
  "bid_rekomendasi": {
    "aman": 000000000,
    "wajar": 000000000,
    "maksimal": 000000000,
    "penjelasan": "penjelasan singkat mengapa harga bid ini direkomendasikan berdasarkan kondisi unit"
  },
  "potensi_profit": {
    "jual_target": 000000000,
    "margin_bersih_estimasi": 000000000,
    "catatan": "catatan singkat tentang potensi profit"
  },
  "faktor_perhatian": ["faktor1", "faktor2", "faktor3"],
  "kesimpulan": "1-2 kalimat rekomendasi final untuk keputusan beli di lelang"
}

Gunakan data pasar Indonesia yang akurat. Semua angka dalam Rupiah (integer tanpa titik/koma).`;

  const GEMINI_KEY = 'AIzaSyAPET_LMTcFD7m-6OSdNJk81FHcDwsUMeo';
  const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.3, maxOutputTokens: 1500 }
    })
  });

  const data = await response.json();
  if (data.error) throw new Error(data.error.message);

  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';

  // Parse JSON
  const clean = text.replace(/```json|```/g, '').trim();
  const jsonMatch = clean.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('Invalid response');
  return JSON.parse(jsonMatch[0]);
}

function fmt(n) {
  if (!n) return '-';
  return 'Rp ' + Math.round(n).toLocaleString('id-ID');
}

function fmtShort(n) {
  if (!n) return '-';
  const juta = n / 1000000;
  return juta % 1 === 0 ? juta + ' Jt' : juta.toFixed(1) + ' Jt';
}
